<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="leftMenu">
            <input id="btn_start" class="btn" type="button" value="Start" onclick="main();">
            <input id="btn_pause" class="btn" type="button" value="Pause" onclick="isPaused = !isPaused;">
            <input id="btn_tutorial" class="btn" type="button" value="Tutorial" onclick="doTutorial();">
            <input id="btn_debug" class="btn" type="button" value="Debug Window" onclick="isDebug = !isDebug;">
            <table id="player_stats_table"></table>
        </div>

        <div id="gameScreen" oncontextmenu="return false;">
            <canvas id="canv"></canvas>
        </div>

        <div id="rightMenu">
            <table id="game_stats_table"></table>
        </div>


        <script src="lets.js"></script>
        <script src="main.js"></script>
        <script src="classes.js"></script>
    </body>
</html>
